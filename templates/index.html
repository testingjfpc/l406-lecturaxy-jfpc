<!DOCTYPE html>
<html>

<head>
 <meta http-equiv="refresh" content="2"></meta>
<style>
	#tabla{border-collapse:collapse;
		}
	#q1,#q2,#q3,#q4{	/*Varios id con mismas características*/
		width:100px;
		height:100px;
		border:1px solid black;
		text-align:center;
		}
	#q1{background-color:	/*Cuadrante 1*/
		{% if ejeX > 0 and ejeY > 0 %}
			lightblue;
		{% else %}
			gray;
		{% endif %}
		}
	#q2{background-color:	/*Cuadrante 2*/
		{% if ejeX > 0 and ejeY < 0 %}
			lightblue;
		{% else %}
			gray;
		{% endif %}
		}
	#q3{background-color:	/*Cuadrante 3*/
		{% if ejeX < 0 and ejeY > 0 %}
			lightblue;
		{% else %}
			gray;
		{% endif %}
		}
	#q4{background-color:	/*Cuadrante 4*/
		{% if ejeX < 0 and ejeY < 0 %}
			lightblue;
		{% else %}
			gray;
		{% endif %}
		}
</style>

</head>
<body>

<h1>Posición XY</h1>

<p>X = {{ ejeX }}</p>
<p>Y = {{ ejeY }}</p>

<table id="tabla">
<tr id="cuadros">
    <td id="q1">Q1</td>
    <td id="q2">Q2</td>
</tr>
<tr>
    <td id="q3">Q3</td>
    <td id="q4">Q4</td>
</tr>
</table>

</body>
</html>
